# ============================================================
# docker-compose.yml — Développement LOCAL
# Lance backend + PostgreSQL en un seul "docker compose up"
# ============================================================

version: '3.9'

services:

  # ── Base de données PostgreSQL ───────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       portfolio_hpb
      POSTGRES_USER:     hpb_user
      POSTGRES_PASSWORD: hpb_pass_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpb_user -d portfolio_hpb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend Django ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app          # hot reload — changements reflétés en direct
      - media_files:/app/media  # persistance des médias
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: portfolio.settings_prod
      SECRET_KEY:              dev-secret-key-not-for-production
      DATABASE_URL:            postgresql://hpb_user:hpb_pass_local@db:5432/portfolio_hpb
      ALLOWED_HOSTS:           localhost,127.0.0.1,0.0.0.0
      CORS_ALLOWED_ORIGINS:    http://localhost:5173,http://localhost:3000
      DEBUG:                   "True"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React/Vite ───────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
  node_modules:
